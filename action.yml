name: "promptry eval"
description: "Run promptry eval suites in CI. Catches LLM regressions and comments on PRs."

branding:
  icon: check-circle
  color: orange

inputs:
  suite:
    description: "Eval suite to run"
    required: true
  module:
    description: "Python module containing the eval suite"
    required: true
  compare:
    description: "Baseline to compare against (e.g. prod)"
    required: false
    default: ""
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  extras:
    description: "pip extras to install with promptry"
    required: false
    default: "semantic"
  pr-comment:
    description: "Post a comment on the PR with results (default: true)"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for posting PR comments"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install promptry
      shell: bash
      run: pip install "promptry[${{ inputs.extras }}]"

    - name: Install project dependencies
      shell: bash
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        if [ -f pyproject.toml ]; then
          pip install -e .
        fi

    - name: Run eval suite
      id: eval
      shell: bash
      run: |
        COMPARE_FLAG=""
        if [ -n "${{ inputs.compare }}" ]; then
          COMPARE_FLAG="--compare ${{ inputs.compare }}"
        fi

        MD_FILE="${RUNNER_TEMP}/promptry-summary.md"
        HTML_FILE="${RUNNER_TEMP}/promptry-report.html"

        # Run the suite. On PRs we also generate a Markdown summary and
        # HTML report so the follow-up step can post a comment. We never
        # want the comment step skipped just because the eval regressed,
        # so we capture the exit code and re-raise it at the end.
        set +e
        if [ "${{ inputs.pr-comment }}" = "true" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
          promptry run "${{ inputs.suite }}" --module "${{ inputs.module }}" \
            $COMPARE_FLAG \
            --markdown "$MD_FILE" \
            --output "$HTML_FILE"
        else
          promptry run "${{ inputs.suite }}" --module "${{ inputs.module }}" $COMPARE_FLAG
        fi
        EVAL_EXIT=$?
        set -e

        echo "MD_FILE=$MD_FILE" >> $GITHUB_ENV
        echo "HTML_FILE=$HTML_FILE" >> $GITHUB_ENV
        echo "eval_exit=$EVAL_EXIT" >> $GITHUB_OUTPUT

    - name: Post PR comment
      if: inputs.pr-comment == 'true' && github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const path = process.env.MD_FILE;
          if (!path || !fs.existsSync(path)) {
            core.info(`No promptry markdown summary at ${path}, skipping comment.`);
            return;
          }
          const body = fs.readFileSync(path, 'utf8');
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          if (!issue_number) {
            core.info('No PR number in context; skipping comment.');
            return;
          }

          // Update an existing promptry comment if one exists, otherwise
          // create a new one. This prevents comment spam on repeated pushes.
          const comments = await github.rest.issues.listComments({
            owner, repo, issue_number, per_page: 100,
          });
          const marker = '_Generated by [promptry]';
          const existing = comments.data.find(c => (c.body || '').includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: existing.id, body,
            });
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number, body,
            });
          }

    - name: Propagate eval exit code
      if: always()
      shell: bash
      run: |
        EXIT="${{ steps.eval.outputs.eval_exit }}"
        if [ -z "$EXIT" ]; then EXIT=0; fi
        exit "$EXIT"
